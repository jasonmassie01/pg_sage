name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sidecar/go.sum

      - name: Build
        working-directory: sidecar
        run: go build ./...

      - name: Vet
        working-directory: sidecar
        run: go vet ./...

      - name: Test
        working-directory: sidecar
        run: go test ./... -count=1 -timeout 300s -p 1

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sidecar/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: sidecar
          version: latest
          args: --timeout 5m
